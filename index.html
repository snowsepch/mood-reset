<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>情緒重開機｜門市深呼吸碎紙機</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/marvelapp/devices.css@master/assets/devices.min.css">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100dvh;
    background:radial-gradient(circle at 50% 20%, #26241f 0%, #141310 70%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
    overflow-x:hidden;
  }
  .frame-scale-wrap{
    position:relative;
  }
  #marvel-device{
    position:absolute;
    top:0;
    left:0;
    filter:drop-shadow(0 40px 70px rgba(0,0,0,.55));
  }
  .marvel-device .screen iframe{
    width:100%;
    height:100%;
    border:0;
    display:block;
  }
</style>
</head>
<body>

  <div class="frame-scale-wrap" id="frame-scale-wrap">
    <div class="marvel-device iphone-x" id="marvel-device">
      <div class="notch">
        <div class="camera"></div>
        <div class="speaker"></div>
      </div>
      <div class="top-bar"></div>
      <div class="sleep"></div>
      <div class="bottom-bar"></div>
      <div class="volume"></div>
      <div class="overflow">
        <div class="shadow shadow--tr"></div>
        <div class="shadow shadow--tl"></div>
        <div class="shadow shadow--br"></div>
        <div class="shadow shadow--bl"></div>
      </div>
      <div class="inner-shadow"></div>
      <div class="screen">
        <iframe src="app.html" title="情緒重開機"></iframe>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var wrap = document.getElementById("frame-scale-wrap");
  var device = document.getElementById("marvel-device");

  function fitDevice(){
    device.style.zoom = "1";
    var rect = device.getBoundingClientRect();
    var naturalW = rect.width;
    var naturalH = rect.height;
    var maxW = Math.min(naturalW, window.innerWidth * 0.9, window.innerHeight * 0.92 * (naturalW / naturalH));
    var scale = maxW / naturalW;
    device.style.zoom = String(scale);
    wrap.style.width = (naturalW * scale) + "px";
    wrap.style.height = (naturalH * scale) + "px";
  }

  window.addEventListener("resize", fitDevice);
  window.addEventListener("load", fitDevice);
  fitDevice();
})();
</script>
</body>
</html>
