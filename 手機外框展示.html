<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>情緒重開機｜手機外框展示圖</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/marvelapp/devices.css@master/assets/devices.min.css">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:radial-gradient(circle at 50% 20%, #26241f 0%, #141310 70%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:28px;
    padding:40px 16px;
    font-family:"Noto Sans TC","PingFang TC","Heiti TC",system-ui,-apple-system,sans-serif;
    overflow-x:hidden;
  }
  .caption{
    text-align:center;
    color:#EFEAE0;
  }
  .caption h1{
    margin:0;
    font-size:20px;
    font-weight:700;
    letter-spacing:.02em;
  }
  .caption p{
    margin:6px 0 0;
    font-size:13px;
    color:#9A9488;
  }
  .frame-scale-wrap{
    position:relative;
  }
  #marvel-device{
    position:absolute;
    top:0;
    left:0;
    transform-origin:top left;
    filter:drop-shadow(0 40px 70px rgba(0,0,0,.55));
  }
  .marvel-device .screen iframe{
    width:100%;
    height:100%;
    border:0;
    display:block;
  }
</style>
</head>
<body>

  <div class="caption">
    <h1>情緒重開機</h1>
    <p>門市第一線人員紓壓工具 · 手機版預覽</p>
  </div>

  <div class="frame-scale-wrap" id="frame-scale-wrap">
    <div class="marvel-device iphone-x" id="marvel-device">
      <div class="notch">
        <div class="camera"></div>
        <div class="speaker"></div>
      </div>
      <div class="top-bar"></div>
      <div class="sleep"></div>
      <div class="bottom-bar"></div>
      <div class="volume"></div>
      <div class="overflow">
        <div class="shadow shadow--tr"></div>
        <div class="shadow shadow--tl"></div>
        <div class="shadow shadow--br"></div>
        <div class="shadow shadow--bl"></div>
      </div>
      <div class="inner-shadow"></div>
      <div class="screen">
        <iframe src="index.html" title="情緒重開機 手機版預覽"></iframe>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var wrap = document.getElementById("frame-scale-wrap");
  var device = document.getElementById("marvel-device");

  function fitDevice(){
    device.style.transform = "none";
    var rect = device.getBoundingClientRect();
    var naturalW = rect.width;
    var naturalH = rect.height;
    var maxW = Math.min(naturalW, window.innerWidth * 0.84, window.innerHeight * 0.7 * (naturalW / naturalH));
    var scale = maxW / naturalW;
    device.style.transform = "scale(" + scale + ")";
    wrap.style.width = (naturalW * scale) + "px";
    wrap.style.height = (naturalH * scale) + "px";
  }

  window.addEventListener("resize", fitDevice);
  window.addEventListener("load", fitDevice);
  fitDevice();
})();
</script>
</body>
</html>
