<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>情緒重開機｜手機外框展示圖</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:radial-gradient(circle at 50% 20%, #26241f 0%, #141310 70%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:28px;
    padding:40px 16px;
    font-family:"Noto Sans TC","PingFang TC","Heiti TC",system-ui,-apple-system,sans-serif;
    overflow-x:hidden;
  }
  .caption{
    text-align:center;
    color:#EFEAE0;
  }
  .caption h1{
    margin:0;
    font-size:20px;
    font-weight:700;
    letter-spacing:.02em;
  }
  .caption p{
    margin:6px 0 0;
    font-size:13px;
    color:#9A9488;
  }
  .phone-frame{
    position:relative;
    width:min(380px, 84vw);
    aspect-ratio:380/823;
    background:linear-gradient(150deg,
      #e6e6e6 0%, #b0b0b0 12%, #5c5c5c 24%, #2c2c2c 34%,
      #2c2c2c 66%, #5c5c5c 76%, #b0b0b0 88%, #e6e6e6 100%);
    border-radius:14%;
    padding:2.4%;
    box-shadow:
      0 50px 90px rgba(0,0,0,.55),
      0 14px 30px rgba(0,0,0,.4);
  }
  .phone-bezel{
    position:relative;
    width:100%;
    height:100%;
    background:#060606;
    border-radius:12.2%;
    padding:1.8%;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
  }
  .phone-screen{
    position:relative;
    width:100%;
    height:100%;
    border-radius:10.8%;
    overflow:hidden;
    background:#0A0E1A;
  }
  .phone-screen iframe{
    width:100%;
    height:100%;
    border:0;
    display:block;
  }
  .notch{
    position:absolute;
    top:1.7%;
    left:50%;
    transform:translateX(-50%);
    width:31%;
    height:3.6%;
    background:#000;
    border-radius:20px;
    z-index:5;
    pointer-events:none;
  }
  .home-indicator{
    position:absolute;
    bottom:1.2%;
    left:50%;
    transform:translateX(-50%);
    width:31.6%;
    height:0.7%;
    background:rgba(255,255,255,.55);
    border-radius:3px;
    z-index:5;
    pointer-events:none;
  }
  .side-btn{
    position:absolute;
    background:linear-gradient(90deg, #8f8f8f, #d8d8d8, #8f8f8f);
    border-radius:3px;
    box-shadow:inset 0 0 2px rgba(0,0,0,.4);
  }
  .side-btn.power{
    right:-3px;
    top:23%;
    width:4px;
    height:9.2%;
  }
  .side-btn.vol-up{
    left:-3px;
    top:18.2%;
    width:4px;
    height:5.4%;
  }
  .side-btn.vol-down{
    left:-3px;
    top:24.9%;
    width:4px;
    height:5.4%;
  }
</style>
</head>
<body>

  <div class="caption">
    <h1>情緒重開機</h1>
    <p>門市第一線人員紓壓工具 · 手機版預覽</p>
  </div>

  <div class="phone-frame">
    <div class="side-btn power"></div>
    <div class="side-btn vol-up"></div>
    <div class="side-btn vol-down"></div>
    <div class="phone-bezel">
      <div class="phone-screen">
        <div class="notch"></div>
        <iframe src="index.html" title="情緒重開機 手機版預覽"></iframe>
        <div class="home-indicator"></div>
      </div>
    </div>
  </div>

</body>
</html>
